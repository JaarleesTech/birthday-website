<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Birthday Website </title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="images/favicon.png">
</head>
<body>
    <div id="header">
      <h1>Today is Mohamed's Birthday</h1>
      <img class="bff-img" src="images/image.png" alt="Mohamed's birth day photo">
      <h2 id="bday-age">34 years old</h2>
      <h4 id="bday-date">05.02.2026</h4>
    </div>
    <div class="gift-section">
        <h2 class="gift-title"> Here's how happy I am for today </h2>
        <h3 class="gift-hint"> (hover over the gift) </h3>
        <div class="gift-img" id="gift-happy-img"></div>
    </div>
     <div class="gift-section">
        <h2 class="gift-title"> How people react when I enter the room 😮 </h2>
        <div class="gift-img" id="gift-hot-img"></div>
    </div>
     <div class="gift-section">
        <h2 class="gift-title"> I had to describe myself with one word 👇 </h2>
        <div class="gift-img" id="gift-genius-img"></div>
    </div>
     <div class="gift-section">
        <h2 class="gift-title"> The only person as badass as me 💪 </h2>
        <div class="gift-img" id="gift-badass-img"></div>
    </div>
     <div class="gift-section">
        <h2 class="gift-title"> This one is for me 🍺 </h2>
        <div class="gift-img" id="gift-cheers-img"></div>
    </div>
    
</body>
</html>
